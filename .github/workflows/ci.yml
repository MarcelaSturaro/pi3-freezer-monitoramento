yaml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
	  node-version: '20'

      - name: Install backend dependencies
	run: |
	  cd backend-freezer
	  npm install

      - name: Run backend tests
	run: |
	  cd backend-freezer
	  npm test
